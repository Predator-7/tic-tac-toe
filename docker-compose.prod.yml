services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=CHANGEME_IN_PROD
    volumes:
      - data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 10s
      timeout: 5s
      retries: 5

  nakama:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:CHANGEME_IN_PROD@postgres:5432/nakama &&
        exec /nakama/nakama --name nakama1 --database.address postgres:CHANGEME_IN_PROD@postgres:5432/nakama --logger.level INFO --session.token_expiry_sec 7200
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  data:
